name: go-go-os-platform-ci

on:
  push:
    branches:
      - main
      - task/**
  pull_request:

jobs:
  frontend-platform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend platform packages/apps
        run: pnpm run build

      - name: Run frontend tests
        run: pnpm run test
